name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'iyaaman-app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iyaaman-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iyaaman-app/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /BobMarley-ODI-Demo
      - name: Publish to gh-pages
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/ghp gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/ghp
          fi
          rsync -a --delete --exclude=.git iyaaman-app/out/ /tmp/ghp/
          cd /tmp/ghp
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "Deploy: ${GITHUB_SHA::7}"
            git push --force origin gh-pages
          fi
